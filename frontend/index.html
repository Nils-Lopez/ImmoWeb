<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FlatSwipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <div id="app">
    <!-- Bottom Nav -->
    <nav id="bottom-nav">
      <button class="nav-btn" data-view="swipe" id="nav-swipe">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>
        <span>Discover</span>
      </button>
      <button class="nav-btn" data-view="liked" id="nav-liked">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span>Liked</span>
        <span class="badge" id="badge-liked"></span>
      </button>
      <button class="nav-btn" data-view="masked" id="nav-masked">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        <span>Nope</span>
        <span class="badge" id="badge-masked"></span>
      </button>
      <button class="nav-btn" data-view="settings" id="nav-settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Search</span>
      </button>
    </nav>

    <!-- ============ SWIPE VIEW ============ -->
    <div id="view-swipe" class="view active">
      <div id="card-container">
        <!-- Cards injected here -->
      </div>
      <div id="empty-state" class="hidden">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <h2>No new flats</h2>
        <p>You've seen everything! Configure your search and refresh to find more.</p>
        <button class="btn btn-primary" onclick="triggerScrape()">Refresh listings</button>
      </div>
      <div id="swipe-buttons">
        <button class="swipe-btn nope" onclick="swipeAction('masked')" title="Nope">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <button class="swipe-btn undo" onclick="undoAction()" title="Undo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <button class="swipe-btn like" onclick="swipeAction('liked')" title="Like">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </button>
      </div>
    </div>

    <!-- ============ LIKED VIEW ============ -->
    <div id="view-liked" class="view">
      <div class="list-header"><h2>Liked flats</h2></div>
      <div id="liked-list" class="flat-list"></div>
    </div>

    <!-- ============ MASKED VIEW ============ -->
    <div id="view-masked" class="view">
      <div class="list-header"><h2>Nope'd flats</h2></div>
      <div id="masked-list" class="flat-list"></div>
    </div>

    <!-- ============ SETTINGS VIEW ============ -->
    <div id="view-settings" class="view">
      <div class="settings-container">
        <h2>Search configuration</h2>
        <div class="field">
          <label>Min price</label>
          <input type="number" id="cfg-min-price" placeholder="0" step="10000">
        </div>
        <div class="field">
          <label>Max price</label>
          <input type="number" id="cfg-max-price" placeholder="500000" step="10000">
        </div>
        <div class="field">
          <label>Postal codes <small>(comma separated)</small></label>
          <input type="text" id="cfg-postal" placeholder="1000,1050,1060">
        </div>
        <button class="btn btn-primary full-width" onclick="saveConfig()">Save</button>

        <div class="divider"></div>

        <h3>Scrape ImmoWeb</h3>
        <p id="last-scrape-info" class="muted"></p>
        <button class="btn btn-secondary full-width" onclick="triggerScrape()" id="scrape-btn">
          Fetch new listings
        </button>
        <div id="scrape-progress" class="muted hidden"></div>

        <div class="divider"></div>

        <h3>Stats</h3>
        <div id="stats-display" class="stats-grid"></div>

        <div class="divider"></div>
        <h3>Demo</h3>
        <button class="btn btn-secondary full-width" onclick="seedData()">Load demo data</button>
      </div>
    </div>

    <!-- ============ DETAIL OVERLAY ============ -->
    <div id="detail-overlay" class="hidden">
      <div class="detail-content">
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        <div id="detail-gallery"></div>
        <div id="detail-info"></div>
        <div class="detail-actions">
          <button class="swipe-btn nope" onclick="detailAction('masked')">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
          <button class="swipe-btn like" onclick="detailAction('liked')">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ============ TOAST ============ -->
    <div id="toast" class="hidden"></div>
  </div>

  <script src="/frontend/app.js"></script>
</body>
</html>
